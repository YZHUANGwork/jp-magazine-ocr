<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Example Output — jp-magazine-ocr</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0e0f11;
  --surface:   #16181c;
  --border:    #2a2d35;
  --accent:    #e8c547;
  --accent2:   #4fc3f7;
  --text:      #e8e9eb;
  --muted:     #6b7280;
  --font-ui:   'Syne', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --bar:       36px;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
}

.topbar {
  height: var(--bar);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}

.topbar a {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent2);
  text-decoration: none;
  border: 1px solid rgba(79,195,247,.35);
  padding: 3px 10px;
  border-radius: 4px;
  transition: background .15s;
  white-space: nowrap;
}
.topbar a:hover { background: rgba(79,195,247,.1); }

.topbar-links { margin-left: auto; display: flex; gap: 8px; }

.viewer {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: calc(100vh - var(--bar));
}

.pane-image {
  border-right: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 12px;
}

.pane-image img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  border: 1px solid var(--border);
  border-radius: 4px;
  display: block;
}

.pane-text {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.text-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.75;
  white-space: pre-wrap;
  color: var(--text);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.text-scroll::-webkit-scrollbar { width: 5px; }
.text-scroll::-webkit-scrollbar-track { background: transparent; }
.text-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.text-scroll::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.loading {
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 24px;
}

.error {
  color: #f06292;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 24px;
}
</style>
</head>
<body>

<div class="topbar">
  <a href="https://github.com/YZHUANGwork/jp-magazine-ocr">← Back to repo</a>
  <div class="topbar-links">
    <a id="link-img" href="#" target="_blank">Annotated image ↗</a>
    <a id="link-txt" href="#" target="_blank">Extracted text ↗</a>
  </div>
</div>

<div class="viewer">
  <div class="pane-image">
    <img id="ocr-img" src="" alt="Annotated OCR output">
  </div>
  <div class="pane-text">
    <div class="text-scroll" id="text-pane">
      <span class="loading">Loading…</span>
    </div>
  </div>
</div>

<script>
const REPO = 'https://github.com/YZHUANGwork/jp-magazine-ocr';
const RAW  = 'https://raw.githubusercontent.com/YZHUANGwork/jp-magazine-ocr/main/ocr_output';
const BLOB = `${REPO}/blob/main/ocr_output`;

const params = new URLSearchParams(window.location.search);
const base   = params.get('base') || '';

if (!base) {
  document.getElementById('text-pane').innerHTML =
    '<span class="error">No ?base= parameter supplied.<br>Example: example_viewer.html?base=ISBN9784533116735_042</span>';
} else {
  const imgRaw  = `${RAW}/${base}_annotated.png`;
  const txtRaw  = `${RAW}/${base}_extracted_text.txt`;
  const imgBlob = `${BLOB}/${base}_annotated.png`;
  const txtBlob = `${BLOB}/${base}_extracted_text.txt`;

  // Set topbar links
  document.getElementById('link-img').href = imgBlob;
  document.getElementById('link-txt').href = txtBlob;

  // Set image
  const img = document.getElementById('ocr-img');
  img.src = imgRaw;
  img.onerror = () => { img.alt = 'Image failed to load'; };

  // Fetch and render text
  fetch(txtRaw)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    })
    .then(txt => {
      document.getElementById('text-pane').textContent = txt;
    })
    .catch(err => {
      document.getElementById('text-pane').innerHTML =
        `<span class="error">Could not load text file: ${err.message}</span>`;
    });
}
</script>

</body>
</html>
